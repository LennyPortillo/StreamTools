<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor — StreamTools</title>
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body>
  <div class="editor-page" id="app">
    <div class="editor-bar">
      <div class="brand">
        <div class="brand-icon">✎</div>
        <div>
          <h1>Editor</h1>
          <span id="author-badge">Conectando…</span>
        </div>
      </div>

      <span class="status" id="status-pill"><span class="dot"></span> Conectado</span>

      <div class="spacer"></div>

      <input class="input" id="name-input" placeholder="Tu nombre" maxlength="20">
      <label class="btn btn-primary">
        Subir imagen
        <input type="file" id="file-input" accept="image/*" multiple>
      </label>
      <button class="btn btn-secondary" id="btn-clear-sel" type="button">Deseleccionar</button>
    </div>

    <div class="editor-help" id="editor-help">
      Arrastrá para mover · Esquina inferior derecha para redimensionar · Supr para borrar · Podés arrastrar archivos al canvas
    </div>

    <main class="editor-canvas-area">
      <div class="canvas-shell">
        <span class="canvas-badge">1920 × 1080</span>
        <div id="stage-wrap">
          <div id="stage">
            <div class="stage-empty" id="stage-empty">Todavía no hay imágenes</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get("token");
    const stage = document.getElementById("stage");
    const stageWrap = document.getElementById("stage-wrap");
    const stageEmpty = document.getElementById("stage-empty");
    const nameInput = document.getElementById("name-input");
    const statusPill = document.getElementById("status-pill");
    const rendered = new Map();
    const pendingRendered = new Map();
    let selectedId = null;
    let scale = 1;
    let moderationEnabled = true;

    if (!token) {
      document.body.innerHTML = `
        <div class="error-page app">
          <div class="card">
            <h2>Link inválido</h2>
            <p>Pedile al streamer un enlace de editor.</p>
          </div>
        </div>`;
      throw new Error("no token");
    }

    nameInput.value = localStorage.getItem("overlay-name") || "";
    nameInput.addEventListener("change", () => localStorage.setItem("overlay-name", nameInput.value));
    document.getElementById("author-badge").textContent = "Token " + token;

    function fitStage() {
      const maxW = window.innerWidth - 32;
      const maxH = window.innerHeight - 130;
      scale = Math.min(maxW / 1920, maxH / 1080, 1);
      stageWrap.style.transform = `scale(${scale})`;
      stageWrap.style.width = "1920px";
      stageWrap.style.height = (1080 * scale) + "px";
    }
    window.addEventListener("resize", fitStage);
    fitStage();

    const socket = io();
    socket.on("connect", () => {
      statusPill.classList.remove("off");
      statusPill.innerHTML = '<span class="dot"></span> Conectado';
    });
    socket.on("disconnect", () => {
      statusPill.classList.add("off");
      statusPill.innerHTML = '<span class="dot"></span> Desconectado';
    });
    socket.on("state", sync);
    socket.on("pending", syncPending);

    fetch(`/api/editor/config?token=${encodeURIComponent(token)}`)
      .then(r => r.json())
      .then(cfg => {
        if (cfg.moderationEnabled === false) return;
        moderationEnabled = true;
        const help = document.getElementById("editor-help");
        help.innerHTML = "Las imágenes pasan por moderación antes de aparecer en OBS · " + help.textContent;
      })
      .catch(() => {});

    function api(method, url, body) {
      const opts = { method, headers: {} };
      if (body && !(body instanceof FormData)) {
        opts.headers["Content-Type"] = "application/json";
        opts.body = JSON.stringify({ ...body, token });
      } else if (body instanceof FormData) {
        body.append("token", token);
        body.append("name", nameInput.value || "Anónimo");
        opts.body = body;
      }
      return fetch(url, opts).then(r => r.json());
    }

    async function uploadFiles(files) {
      for (const file of files) {
        if (!file.type.startsWith("image/")) continue;
        const fd = new FormData();
        fd.append("image", file);
        const res = await api("POST", "/api/upload", fd);
        if (res.error) {
          alert(res.error);
        } else if (res.pending) {
          showToast("Imagen enviada — esperando aprobación del mod");
        }
      }
    }

    function showToast(msg) {
      const t = document.createElement("div");
      t.className = "editor-toast";
      t.textContent = msg;
      document.body.appendChild(t);
      requestAnimationFrame(() => t.classList.add("show"));
      setTimeout(() => {
        t.classList.remove("show");
        setTimeout(() => t.remove(), 300);
      }, 3200);
    }

    function createEl(item, opts = {}) {
      const pending = opts.pending;
      const el = document.createElement("div");
      el.className = pending ? "item pending" : "item";
      el.dataset.id = item.id;
      el.innerHTML = pending
        ? `<img src="${item.url}" alt="">
           <span class="pending-badge">En revisión</span>
           <div class="resize-handle"></div>
           <button class="delete-btn" type="button" title="Cancelar">×</button>`
        : `<img src="${item.url}" alt="">
           <div class="resize-handle"></div>
           <button class="delete-btn" type="button" title="Borrar">×</button>`;
      applyTransform(el, item);
      setupDrag(el, item, pending);
      setupResize(el.querySelector(".resize-handle"), el, item, pending);
      el.addEventListener("click", e => { e.stopPropagation(); select(item.id, pending); });
      el.querySelector(".delete-btn").addEventListener("click", e => {
        e.stopPropagation();
        const base = pending ? "/api/pending" : "/api/items";
        api("DELETE", `${base}/${item.id}?token=${token}`);
        if (selectedId === item.id) selectedId = null;
      });
      stage.appendChild(el);
      return el;
    }

    function applyTransform(el, item) {
      el.style.left = item.x + "px";
      el.style.top = item.y + "px";
      el.style.width = item.width + "px";
      el.style.height = item.height + "px";
      el.style.transform = `rotate(${item.rotation || 0}deg)`;
    }

    function select(id, pending) {
      selectedId = id;
      rendered.forEach((el, iid) => el.classList.toggle("selected", !pending && iid === id));
      pendingRendered.forEach((el, iid) => el.classList.toggle("selected", pending && iid === id));
    }

    stage.addEventListener("click", () => select(null));
    document.getElementById("btn-clear-sel").addEventListener("click", () => select(null));

    document.addEventListener("keydown", e => {
      if ((e.key === "Delete" || e.key === "Backspace") && selectedId && e.target === document.body) {
        e.preventDefault();
        const inPending = pendingRendered.has(selectedId);
        const base = inPending ? "/api/pending" : "/api/items";
        api("DELETE", `${base}/${selectedId}?token=${token}`);
        selectedId = null;
      }
    });

    function setupDrag(el, item, pending) {
      let dragging = false, startX, startY, origX, origY;
      el.addEventListener("pointerdown", e => {
        if (e.target.classList.contains("resize-handle") || e.target.classList.contains("delete-btn")) return;
        dragging = true;
        el.setPointerCapture(e.pointerId);
        startX = e.clientX; startY = e.clientY;
        origX = item.x; origY = item.y;
        select(item.id, pending);
      });
      el.addEventListener("pointermove", e => {
        if (!dragging) return;
        item.x = origX + (e.clientX - startX) / scale;
        item.y = origY + (e.clientY - startY) / scale;
        applyTransform(el, item);
      });
      el.addEventListener("pointerup", () => {
        if (!dragging) return;
        dragging = false;
        const base = pending ? "/api/pending" : "/api/items";
        api("PUT", `${base}/${item.id}`, { x: item.x, y: item.y });
      });
    }

    function setupResize(handle, el, item, pending) {
      let resizing = false, startX, startY, origW, origH;
      handle.addEventListener("pointerdown", e => {
        e.stopPropagation();
        resizing = true;
        handle.setPointerCapture(e.pointerId);
        startX = e.clientX; startY = e.clientY;
        origW = item.width; origH = item.height;
      });
      handle.addEventListener("pointermove", e => {
        if (!resizing) return;
        item.width = Math.max(40, origW + (e.clientX - startX) / scale);
        item.height = Math.max(40, origH + (e.clientY - startY) / scale);
        applyTransform(el, item);
      });
      handle.addEventListener("pointerup", () => {
        if (!resizing) return;
        resizing = false;
        const base = pending ? "/api/pending" : "/api/items";
        api("PUT", `${base}/${item.id}`, { width: item.width, height: item.height });
      });
    }

    function updateEmptyState() {
      const hasAny = rendered.size > 0 || pendingRendered.size > 0;
      stageEmpty.style.display = hasAny ? "none" : "flex";
    }

    function sync(items) {
      const ids = new Set(items.map(i => i.id));
      for (const [id, el] of rendered) {
        if (!ids.has(id)) { el.remove(); rendered.delete(id); if (selectedId === id) selectedId = null; }
      }
      items.forEach(item => {
        let el = rendered.get(item.id);
        if (!el) {
          if (pendingRendered.has(item.id)) {
            pendingRendered.get(item.id).remove();
            pendingRendered.delete(item.id);
          }
          el = createEl(item);
          rendered.set(item.id, el);
        } else applyTransform(el, item);
      });
      updateEmptyState();
    }

    function syncPending(items) {
      const ids = new Set(items.map(i => i.id));
      for (const [id, el] of pendingRendered) {
        if (!ids.has(id)) { el.remove(); pendingRendered.delete(id); if (selectedId === id) selectedId = null; }
      }
      items.forEach(item => {
        if (rendered.has(item.id)) return;
        let el = pendingRendered.get(item.id);
        if (!el) { el = createEl(item, { pending: true }); pendingRendered.set(item.id, el); }
        else applyTransform(el, item);
      });
      updateEmptyState();
    }

    document.getElementById("file-input").addEventListener("change", async e => {
      await uploadFiles(e.target.files);
      e.target.value = "";
    });

    stage.addEventListener("dragover", e => { e.preventDefault(); stage.classList.add("drag-over"); });
    stage.addEventListener("dragleave", e => {
      if (!stage.contains(e.relatedTarget)) stage.classList.remove("drag-over");
    });
    stage.addEventListener("drop", async e => {
      e.preventDefault();
      stage.classList.remove("drag-over");
      await uploadFiles(e.dataTransfer.files);
    });

    fetch("/api/state").then(r => r.json()).then(sync);
  </script>
</body>
</html>
