<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor — StreamTools</title>
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body>
  <div class="editor-shell" id="app">
    <header class="editor-top">
      <div class="editor-top-inner">
        <div class="brand">
          <div class="brand-mark">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>
            </svg>
          </div>
          <div>
            <h1>Editor Overlay</h1>
            <span id="author-badge">Conectando…</span>
          </div>
        </div>

        <span class="pill pill-live" id="status-pill"><span class="dot"></span> En vivo</span>

        <div class="editor-controls">
          <input class="input" id="name-input" placeholder="Tu nombre" maxlength="20">
          <label class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
            Subir imagen
            <input type="file" id="file-input" accept="image/*" multiple>
          </label>
          <button class="btn btn-ghost" id="btn-clear-sel" type="button">Deseleccionar</button>
        </div>
      </div>

      <div class="editor-hints">
        <span class="hint-chip">Arrastrar para mover</span>
        <span class="hint-chip">Esquina ↘ para redimensionar</span>
        <span class="hint-chip">Click para seleccionar</span>
        <span class="hint-chip">Supr para borrar</span>
        <span class="hint-chip">También podés arrastrar archivos al canvas</span>
      </div>
    </header>

    <main class="editor-main">
      <div class="viewport-frame">
        <span class="viewport-label">1920 × 1080 · preview</span>
        <div id="stage-wrap">
          <div id="stage">
            <div class="stage-empty" id="stage-empty">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
              <p>Subí una imagen o arrastrala acá</p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get("token");
    const stage = document.getElementById("stage");
    const stageWrap = document.getElementById("stage-wrap");
    const stageEmpty = document.getElementById("stage-empty");
    const nameInput = document.getElementById("name-input");
    const statusPill = document.getElementById("status-pill");
    const rendered = new Map();
    let selectedId = null;
    let scale = 1;

    if (!token) {
      document.body.innerHTML = `
        <div class="error-page app">
          <div class="card">
            <div class="error-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
            </div>
            <h2>Enlace inválido</h2>
            <p>Necesitás un enlace con token del streamer. Pedile uno por DM.</p>
          </div>
        </div>`;
      throw new Error("no token");
    }

    nameInput.value = localStorage.getItem("overlay-name") || "";
    nameInput.addEventListener("change", () => localStorage.setItem("overlay-name", nameInput.value));
    document.getElementById("author-badge").textContent = "Token · " + token;

    function fitStage() {
      const maxW = window.innerWidth - 48;
      const maxH = window.innerHeight - 160;
      scale = Math.min(maxW / 1920, maxH / 1080, 1);
      stageWrap.style.transform = `scale(${scale})`;
      stageWrap.style.width = "1920px";
      stageWrap.style.height = (1080 * scale) + "px";
    }
    window.addEventListener("resize", fitStage);
    fitStage();

    const socket = io();
    socket.on("connect", () => {
      statusPill.classList.remove("offline");
      statusPill.innerHTML = '<span class="dot"></span> En vivo';
    });
    socket.on("disconnect", () => {
      statusPill.classList.add("offline");
      statusPill.innerHTML = '<span class="dot"></span> Desconectado';
    });
    socket.on("state", sync);

    function api(method, url, body) {
      const opts = { method, headers: {} };
      if (body && !(body instanceof FormData)) {
        opts.headers["Content-Type"] = "application/json";
        opts.body = JSON.stringify({ ...body, token });
      } else if (body instanceof FormData) {
        body.append("token", token);
        body.append("name", nameInput.value || "Anónimo");
        opts.body = body;
      }
      return fetch(url, opts).then(r => r.json());
    }

    async function uploadFiles(files) {
      for (const file of files) {
        if (!file.type.startsWith("image/")) continue;
        const fd = new FormData();
        fd.append("image", file);
        await api("POST", "/api/upload", fd);
      }
    }

    function createEl(item) {
      const el = document.createElement("div");
      el.className = "item";
      el.dataset.id = item.id;
      el.innerHTML = `
        <img src="${item.url}" alt="">
        <div class="resize-handle"></div>
        <button class="delete-btn" type="button" title="Borrar">×</button>`;
      applyTransform(el, item);
      setupDrag(el, item);
      setupResize(el.querySelector(".resize-handle"), el, item);
      el.addEventListener("click", e => { e.stopPropagation(); select(item.id); });
      el.querySelector(".delete-btn").addEventListener("click", e => {
        e.stopPropagation();
        api("DELETE", `/api/items/${item.id}?token=${token}`);
      });
      stage.appendChild(el);
      return el;
    }

    function applyTransform(el, item) {
      el.style.left = item.x + "px";
      el.style.top = item.y + "px";
      el.style.width = item.width + "px";
      el.style.height = item.height + "px";
      el.style.transform = `rotate(${item.rotation || 0}deg)`;
    }

    function select(id) {
      selectedId = id;
      rendered.forEach((el, iid) => el.classList.toggle("selected", iid === id));
    }

    stage.addEventListener("click", () => select(null));
    document.getElementById("btn-clear-sel").addEventListener("click", () => select(null));

    document.addEventListener("keydown", e => {
      if ((e.key === "Delete" || e.key === "Backspace") && selectedId && e.target === document.body) {
        e.preventDefault();
        api("DELETE", `/api/items/${selectedId}?token=${token}`);
        selectedId = null;
      }
    });

    function setupDrag(el, item) {
      let dragging = false, startX, startY, origX, origY;
      el.addEventListener("pointerdown", e => {
        if (e.target.classList.contains("resize-handle") || e.target.classList.contains("delete-btn")) return;
        dragging = true;
        el.setPointerCapture(e.pointerId);
        startX = e.clientX; startY = e.clientY;
        origX = item.x; origY = item.y;
        select(item.id);
      });
      el.addEventListener("pointermove", e => {
        if (!dragging) return;
        item.x = origX + (e.clientX - startX) / scale;
        item.y = origY + (e.clientY - startY) / scale;
        applyTransform(el, item);
      });
      el.addEventListener("pointerup", () => {
        if (!dragging) return;
        dragging = false;
        api("PUT", `/api/items/${item.id}`, { x: item.x, y: item.y });
      });
    }

    function setupResize(handle, el, item) {
      let resizing = false, startX, startY, origW, origH;
      handle.addEventListener("pointerdown", e => {
        e.stopPropagation();
        resizing = true;
        handle.setPointerCapture(e.pointerId);
        startX = e.clientX; startY = e.clientY;
        origW = item.width; origH = item.height;
      });
      handle.addEventListener("pointermove", e => {
        if (!resizing) return;
        item.width = Math.max(40, origW + (e.clientX - startX) / scale);
        item.height = Math.max(40, origH + (e.clientY - startY) / scale);
        applyTransform(el, item);
      });
      handle.addEventListener("pointerup", () => {
        if (!resizing) return;
        resizing = false;
        api("PUT", `/api/items/${item.id}`, { width: item.width, height: item.height });
      });
    }

    function sync(items) {
      stageEmpty.style.display = items.length ? "none" : "flex";
      const ids = new Set(items.map(i => i.id));
      for (const [id, el] of rendered) {
        if (!ids.has(id)) { el.remove(); rendered.delete(id); if (selectedId === id) selectedId = null; }
      }
      items.forEach(item => {
        let el = rendered.get(item.id);
        if (!el) { el = createEl(item); rendered.set(item.id, el); }
        else applyTransform(el, item);
      });
    }

    document.getElementById("file-input").addEventListener("change", async e => {
      await uploadFiles(e.target.files);
      e.target.value = "";
    });

    stage.addEventListener("dragover", e => { e.preventDefault(); stage.classList.add("drag-over"); });
    stage.addEventListener("dragleave", e => {
      if (!stage.contains(e.relatedTarget)) stage.classList.remove("drag-over");
    });
    stage.addEventListener("drop", async e => {
      e.preventDefault();
      stage.classList.remove("drag-over");
      await uploadFiles(e.dataTransfer.files);
    });

    fetch("/api/state").then(r => r.json()).then(sync);
  </script>
</body>
</html>
